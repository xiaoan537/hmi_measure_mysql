[db]
driver=QMYSQL
host=localhost
port=3306
name=hmi_dev
user=hmi
pass=hmi_pass
options=MYSQL_OPT_RECONNECT=1

[paths]
data_root=./data
raw_dir=./data/raw
log_dir=./data/logs

[mes]
enabled=1
manual_enabled=1
auto_enabled=0
auto_interval_ms=1000

; 兼容旧配置：作为普通报工默认地址
url=http://127.0.0.1:8080/msService/public/DeviceIf/Bjx/22ECCC01/SendRecord

; SYS 类接口（该文档中的 SYS 类接口都需要对接）
sysid=
sys_base_url=http://127.0.0.1:8080/msService/public/DeviceIf/SYS
sys_heartbeat_url=
sys_op_check_user_url=
sys_op_check_tech_state_url=

; 生产报工接口：普通/二次/三次/军检走不同地址
; 普通报工接口地址来自当前文档：22ECCC01/SendRecord
prod_normal_url=http://127.0.0.1:8080/msService/public/DeviceIf/Bjx/22ECCC01/SendRecord
; 以下三个地址当前先占位，待 MES 提供真实地址后替换
prod_second_url=http://127.0.0.1:8080/msService/public/DeviceIf/Bjx/22ECCC02/SendRecord
prod_third_url=http://127.0.0.1:8080/msService/public/DeviceIf/Bjx/22ECCC03/SendRecord
prod_mil_url=http://127.0.0.1:8080/msService/public/DeviceIf/Bjx/22ECCC04/SendRecord

auth_token=
timeout_ms=5000
retry_base_seconds=30
retry_max_seconds=21600

[scan_a]
; A 型：CONF 4ch
rings=1
points_per_ring=72
angle_step_deg=5.0
order_code=1

[scan_b]
; B 型：RUNO 2ch
rings=1
points_per_ring=72
angle_step_deg=5.0
order_code=1


; 项目的应用程序配置文件，采用 INI 格式组织，包含两个主要配置部分：
; 1. 数据库配置：用于配置数据库连接信息，包括数据库驱动、主机地址、端口号、数据库名称、用户名和密码等。
; 2. 路径配置：用于配置项目的数据路径，包括数据根目录、原始数据目录和日志目录等。
; 3. MES 配置：用于配置与 MES 系统的集成，包括 MES 系统的 URL、认证令牌、超时时间、重试间隔等。
