[db]
driver=QMYSQL
host=localhost
port=3306
name=hmi_dev
user=hmi
pass=hmi_pass
options=MYSQL_OPT_RECONNECT=1

[paths]
data_root=./data
raw_dir=./data/raw
log_dir=./data/logs

[mes]
enabled=1
; 手动/自动上传开关分离：
manual_enabled=1
auto_enabled=0
auto_interval_ms=1000
url=http://127.0.0.1:18080/mes/measurements
auth_token=
timeout_ms=5000
retry_base_seconds=30
retry_max_seconds=21600

[scan_a]
; A 型：CONF 4ch
rings=1
points_per_ring=72
angle_step_deg=5.0
order_code=1

[scan_b]
; B 型：RUNO 2ch
rings=1
points_per_ring=72
angle_step_deg=5.0
order_code=1


; 项目的应用程序配置文件，采用 INI 格式组织，包含两个主要配置部分：
; 1. 数据库配置：用于配置数据库连接信息，包括数据库驱动、主机地址、端口号、数据库名称、用户名和密码等。
; 2. 路径配置：用于配置项目的数据路径，包括数据根目录、原始数据目录和日志目录等。
; 3. MES 配置：用于配置与 MES 系统的集成，包括 MES 系统的 URL、认证令牌、超时时间、重试间隔等。
